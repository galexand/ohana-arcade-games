<script>
'use strict';

try { LANG = localStorage.getItem('ohanaLang') === 'ro' ? 'ro' : 'en'; } catch (e) {}

    feastTitle: '🌺 FESTIN COMPLET! 🌺',

    best: 'Record: ',
    ing: {
      pineapple: 'Ananas', sugar: 'Zahăr', flour: 'Făină', egg: 'Ou',
      milk: 'Lapte', bread: 'Pâine', cheese: 'Brânză', tomato: 'Roșie',

    },

    ],
  },
};
function tr(key) { return T[LANG][key]; }
function ingName(k) { return T[LANG].ing[k]; }
function recipeName(i) { return T[LANG].recipes[i]; }

// ============ SETUP ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));

// ============ SOUND ============
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  type = type || 'square'; vol = vol || 0.07; slide = slide || 0;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
const sfx = {
  tap()     { beep(600, 0.06, 'square', 0.05, 120); },
  wrong()   { beep(180, 0.12, 'sawtooth', 0.05, -60); },
  correct() { beep(700, 0.09, 'square', 0.06, 260); setTimeout(() => beep(980, 0.08, 'square', 0.05), 60); },
  drop()    { beep(360, 0.08, 'sine', 0.05, -80); },
  bubble()  { beep(220 + Math.random() * 60, 0.07, 'sine', 0.03); },
  flip()    { beep(500, 0.1, 'square', 0.06, -140); },
  buzz()    { beep(140, 0.15, 'sawtooth', 0.06, -40); },
  star()    { [660, 880, 1320].forEach((f, i) => setTimeout(() => beep(f, 0.15, 'triangle', 0.07), i * 70)); },
  bigStar() { [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'triangle', 0.08), i * 90)); },
  go()      { beep(880, 0.3, 'square', 0.08); },
};

// ============ DATA ============
const ING = ['pineapple', 'sugar', 'flour', 'egg', 'milk', 'bread', 'cheese', 'tomato', 'onion', 'carrot', 'butter', 'spaghetti'];
const CUSTOMERS = ['lilo', 'pleakley', 'jumba', 'nani'];
const ACT_VESSEL = { mix: 'bowl', boil: 'pot', fry: 'pan' };

function mkSteps(items, acts) {
  const steps = items.map(i => ({ type: 'ing', item: i }));
  acts.forEach(a => steps.push({ type: 'act', kind: a }));
  return steps;
}
const RECIPES = [
  { icon: 'pineapple', customer: CUSTOMERS[0 % 4], stack: false, steps: mkSteps(['pineapple', 'sugar'], ['mix']) },
  { icon: 'flour', customer: CUSTOMERS[1 % 4], stack: false, steps: mkSteps(['flour', 'egg', 'milk'], ['mix', 'fry']) },
  { icon: 'bread', customer: CUSTOMERS[2 % 4], stack: true, steps: mkSteps(['bread', 'cheese', 'tomato', 'onion'], ['fry']) },
  { icon: 'carrot', customer: CUSTOMERS[3 % 4], stack: false, steps: mkSteps(['carrot', 'onion', 'tomato', 'butter'], ['mix', 'boil']) },
  { icon: 'spaghetti', customer: CUSTOMERS[0 % 4], stack: false, steps: mkSteps(['spaghetti', 'tomato', 'cheese', 'butter'], ['boil', 'mix']) },
  { icon: 'pineapple', customer: CUSTOMERS[1 % 4], stack: false, steps: mkSteps(['pineapple', 'egg', 'flour', 'cheese', 'carrot'], ['mix', 'boil', 'fry']) },
];

function stepVessel(recipe, idx) {
  if (recipe.stack) return 'plate';
  for (let i = idx; i < recipe.steps.length; i++) {
    if (recipe.steps[i].type === 'act') return ACT_VESSEL[recipe.steps[i].kind];
  }
  for (let i = recipe.steps.length - 1; i >= 0; i--) {
    if (recipe.steps[i].type === 'act') return ACT_VESSEL[recipe.steps[i].kind];
  }
  return 'bowl';
}

// ============ PERSISTENCE ============
function getUnlocked() {
  let n = 1;
  try { n = parseInt(localStorage.getItem('superCookingUnlocked') || '1', 10) || 1; } catch (e) {}
  return Math.min(6, Math.max(1, n));
}
function setUnlocked(n) {
  try { localStorage.setItem('superCookingUnlocked', String(n)); } catch (e) {}
}
function getStars(i) {
  let s = 0;
  try { s = parseInt(localStorage.getItem('superCookingStars' + i) || '0', 10) || 0; } catch (e) {}
  return s;
}
function setStars(i, s) {
  try {
    if (s > getStars(i)) localStorage.setItem('superCookingStars' + i, String(s));
  } catch (e) {}
}
function allSixStarred() {
  for (let i = 0; i < 6; i++) if (getStars(i) < 3) return false;
  return true;
}

// ============ STATE ============
const state = { mode: 'title', unlocked: getUnlocked() };
let cook = null; // active cooking session
let mouseDown = false;
let spaceDown = false;
let sparkles = [];
let popups = []; // floating text popups {x,y,text,color,t,life}
let customerBounce = 0;

function addPopup(x, y, text, color) {
  popups.push({ x, y, text, color, t: 0, life: 46 });
}
function addSparkles(cx, cy, n) {
  for (let i = 0; i < n; i++) {
    sparkles.push({ x: cx, y: cy, a: Math.random() * Math.PI * 2, v: 1.5 + Math.random() * 3, t: 0, life: 40 + Math.random() * 20 });
  }
}

// ============ RECIPE SELECT ============
let cards = [];
function layoutCards() {
  cards = [];
  const cols = 2, rows = 3;
  const top = H * 0.2, bot = H * 0.97, left = W * 0.06, right = W * 0.94;
  const cw = (right - left) / cols, ch = (bot - top) / rows;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = r * cols + c;
      cards.push({ idx, x: left + c * cw, y: top + r * ch, w: cw * 0.92, h: ch * 0.86 });
    }
  }
}

function startRecipe(idx) {
  const recipe = RECIPES[idx];
  cook = {
    idx, recipe,
    step: 0,
    phase: 'intro',
    precisions: [],
    bowlItems: [],
    stackItems: [],
    counter: [],
    target: null,
    wrongCount: 0,
    transT: 0,
    act: null,
    finalStars: 0,
  };
  state.mode = 'cook';
  sfx.go();
}

function beginStep() {
  const s = cook.recipe.steps[cook.step];
  if (!s) { finishRecipe(); return; }
  if (s.type === 'ing') {
    cook.phase = 'ing';
    cook.wrongCount = 0;
    cook.target = s.item;
    const pool = ING.filter(i => i !== s.item);
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const n = Math.min(pool.length, 4 + Math.floor(Math.random() * 2)); // 4-5 distractors
    const items = [s.item, ...pool.slice(0, n)];
    for (let i = items.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [items[i], items[j]] = [items[j], items[i]];
    }
    layoutCounter(items);
  } else {
    cook.phase = 'act';
    beginAction(s.kind);
  }
}

function layoutCounter(items) {
  const cols = Math.min(items.length, 3);
  const rows = Math.ceil(items.length / cols);
  const top = H * 0.62, left = W * 0.08, right = W * 0.92;
  const cw = (right - left) / cols, ch = H * 0.28 / rows;
  cook.counter = items.map((item, i) => {
    const r = Math.floor(i / cols), c = i % cols;
    const perRow = Math.min(cols, items.length - r * cols);
    const rowLeft = left + (cw * (cols - perRow)) / 2;
    return { item, x: rowLeft + (c + 0.5) * cw, y: top + (r + 0.5) * ch, r: Math.min(cw, ch) * 0.36, wob: 0 };
  });
}

function ingredientTapped(cell) {
  if (cell.item === cook.target) {
    const precision = Math.max(40, 100 - cook.wrongCount * 20);
    cook.precisions.push(precision);
    if (cook.recipe.stack) cook.stackItems.push(cell.item);
    else cook.bowlItems.push(cell.item);
    sfx.correct();
    addPopup(cell.x, cell.y - 10, '+' + precision, '#7fe8a0');
    addSparkles(cell.x, cell.y, 10);
    cook.step++;
    cook.transT = 22;
    cook.phase = 'ingDone';
  } else {
    cook.wrongCount++;
    cell.wob = 10;
    sfx.buzz();
  }
}

function beginAction(kind) {
  if (kind === 'mix') {
    cook.act = { kind: 'mix', progress: 0, dragging: false, lastAngle: null, spoonRot: 0, samples: [] };
  } else if (kind === 'boil') {
    cook.act = { kind: 'boil', t: 0, zoneCenter: 0.3 + Math.random() * 0.4, zoneHalf: 0.09, attempt: 1, resolved: false, foamT: 0 };
  } else if (kind === 'fry') {
    cook.act = { kind: 'fry', side: 0, timer: 0, duration: 360, retryUsed: false, flash: 0, smokeT: 0 };
  }
}

function actionComplete(precision) {
  cook.precisions.push(precision);
  sfx.star();
  addSparkles(W / 2, H * 0.42, 16);
  cook.step++;
  cook.act = null;
  cook.transT = 26;
  cook.phase = 'actDone';
}

function finishRecipe() {
  const avg = cook.precisions.length ? cook.precisions.reduce((a, b) => a + b, 0) / cook.precisions.length : 60;
  const stars = avg >= 85 ? 3 : (avg >= 60 ? 2 : 1);
  cook.finalStars = stars;
  setStars(cook.idx, stars);
  const wasUnlocked = state.unlocked;
  if (cook.idx + 1 < 6 && state.unlocked <= cook.idx + 1) {
    state.unlocked = cook.idx + 2;
    setUnlocked(state.unlocked);
  }
  cook.justUnlocked = state.unlocked > wasUnlocked;
  cook.masterChef = cook.idx === 5 && allSixStarred();
  cook.feast = cook.idx === 5;
  cook.phase = 'result';
  customerBounce = stars === 3 ? 40 : 0;
  if (stars === 3) sfx.bigStar(); else sfx.star();
}

// ============ INPUT ============
function angleFromCenter(px, py) {
  const cx = W / 2, cy = H * 0.5;
  return Math.atan2(py - cy, px - cx);
}
function angleDiff(a, b) {
  let d = a - b;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}

function onDown(px, py) {
  initAudio();
  mouseDown = true;
  if (state.mode === 'title') {
    state.mode = 'select';
    layoutCards();
    return;
  }
  if (state.mode === 'select') {
    for (const c of cards) {
      if (c.idx >= 6) continue;
      if (px >= c.x && px <= c.x + c.w && py >= c.y && py <= c.y + c.h) {
        if (c.idx < state.unlocked) startRecipe(c.idx);
        else { sfx.buzz(); addPopup(c.x + c.w / 2, c.y + c.h / 2, '🔒', '#fff'); }
      }
    }
    return;
  }
  if (state.mode !== 'cook') return;
  if (cook.phase === 'intro') {
    beginStep();
    return;
  }
  if (cook.phase === 'ing') {
    for (const cell of cook.counter) {
      const dx = px - cell.x, dy = py - cell.y;
      if (dx * dx + dy * dy < (cell.r * 1.25) * (cell.r * 1.25)) { ingredientTapped(cell); break; }
    }
    return;
  }
  if (cook.phase === 'act') {
    const a = cook.act;
    if (a.kind === 'mix') {
      const dx = px - W / 2, dy = py - H * 0.5;
      if (Math.sqrt(dx * dx + dy * dy) < Math.min(W, H) * 0.32) {
        a.dragging = true;
        a.lastAngle = angleFromCenter(px, py);
      }
    } else if (a.kind === 'boil') {
      handleBoilTap();
    } else if (a.kind === 'fry') {
      handleFryTap();
    }
    return;
  }
  if (cook.phase === 'result') {
    state.mode = 'select';
    layoutCards();
    cook = null;
  }
}
function onMove(px, py) {
  if (state.mode !== 'cook' || !cook || cook.phase !== 'act') return;
  const a = cook.act;
  if (a.kind === 'mix' && a.dragging) {
    const ang = angleFromCenter(px, py);
    const d = angleDiff(ang, a.lastAngle);
    a.lastAngle = ang;
    const amt = Math.abs(d);
    a.progress += amt * 26;
    a.spoonRot += d;
    a.samples.push(amt);
    if (a.samples.length > 90) a.samples.shift();
    if (a.progress >= 100 && !a.resolved) {
      a.resolved = true;
      const mean = a.samples.reduce((x, y) => x + y, 0) / a.samples.length || 0.01;
      const variance = a.samples.reduce((x, y) => x + (y - mean) * (y - mean), 0) / a.samples.length;
      const consistency = Math.max(0, 100 - Math.sqrt(variance) * 900);
      actionComplete(Math.round(Math.min(100, 55 + consistency * 0.45)));
    }
  }
}
function onUp() {
  mouseDown = false;
  if (cook && cook.act && cook.act.kind === 'mix') cook.act.dragging = false;
}

function handleBoilTap() {
  const a = cook.act;
  if (a.foamT > 0 || a.resolved) return;
  const pos = boilNeedlePos(a);
  const dist = Math.abs(pos - a.zoneCenter);
  if (dist <= a.zoneHalf) {
    a.resolved = true;
    sfx.correct();
    actionComplete(a.attempt === 1 ? 100 : 75);
  } else if (dist <= a.zoneHalf * 2) {
    a.resolved = true;
    sfx.tap();
    actionComplete(a.attempt === 1 ? 72 : 60);
  } else {
    sfx.buzz();
    a.foamT = 50;
    if (a.attempt === 1) {
      a.attempt = 2;
      a.zoneHalf *= 1.7;
    } else {
      a.resolved = true;
      setTimeout(() => actionComplete(50), 500);
    }
  }
}
function boilNeedlePos(a) {
  return 0.5 + 0.46 * Math.sin(a.t * 0.045);
}

function fryProgress(a) {
  return Math.min(1, a.timer / a.duration);
}
function handleFryTap() {
  const a = cook.act;
  if (a.smokeT > 0) return;
  const p = fryProgress(a);
  if (p < 0.5) { sfx.tap(); return; } // too early, just a soft tap, no penalty
  if (p >= 0.5 && p <= 0.78) {
    // good flip
    const center = 0.64;
    const closeness = 1 - Math.abs(p - center) / 0.14;
    const precisionThisSide = Math.round(70 + closeness * 30);
    a.sidePrecisions = a.sidePrecisions || [];
    a.sidePrecisions.push(Math.max(60, precisionThisSide));
    sfx.flip();
    a.flash = 10;
    a.side++;
    a.timer = 0;
    if (a.side >= 2) {
      const avg = a.sidePrecisions.reduce((x, y) => x + y, 0) / a.sidePrecisions.length;
      actionComplete(Math.round(avg));
    }
  } else {
    // burnt
    sfx.buzz();
    a.smokeT = 60;
    if (!a.retryUsed) {
      a.retryUsed = true;
      a.duration = 520;
      a.timer = 0;
    } else {
      a.sidePrecisions = a.sidePrecisions || [];
      a.sidePrecisions.push(55);
      a.side++;
      a.timer = 0;
      a.duration = 360;
      if (a.side >= 2) {
        const avg = a.sidePrecisions.reduce((x, y) => x + y, 0) / a.sidePrecisions.length;
        setTimeout(() => actionComplete(Math.round(avg)), 400);
      }
    }
  }
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.changedTouches.length) onDown(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.changedTouches.length) onMove(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); onUp(); }, { passive: false });
canvas.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
canvas.addEventListener('mousemove', e => { if (mouseDown) onMove(e.clientX, e.clientY); });
canvas.addEventListener('mouseup', () => onUp());

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    initAudio();
    if (e.repeat) {
      if (e.code === 'Space') spaceDown = true;
      return;
    }
    if (state.mode === 'title') { state.mode = 'select'; layoutCards(); return; }
    if (state.mode === 'select') {
      for (let i = 0; i < 6; i++) {
        if (i < state.unlocked && getStars(i) < 3) { startRecipe(i); return; }
      }
      if (state.unlocked - 1 >= 0) startRecipe(state.unlocked - 1);
      return;
    }
    if (state.mode === 'cook') {
      if (cook.phase === 'intro') { beginStep(); return; }
      if (cook.phase === 'act') {
        if (cook.act.kind === 'mix') spaceDown = true;
        else if (cook.act.kind === 'boil') handleBoilTap();
        else if (cook.act.kind === 'fry') handleFryTap();
        return;
      }
      if (cook.phase === 'result') { state.mode = 'select'; layoutCards(); cook = null; return; }
    }
  }
});
window.addEventListener('keyup', e => { if (e.code === 'Space') spaceDown = false; });

// ============ UPDATE ============
function update() {
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i]; p.t++;
    if (p.t >= p.life) popups.splice(i, 1);
  }
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i]; s.t++;
    if (s.t >= s.life) sparkles.splice(i, 1);
  }
  if (customerBounce > 0) customerBounce--;

  if (state.mode !== 'cook' || !cook) return;

  if (cook.phase === 'ingDone' || cook.phase === 'actDone') {
    cook.transT--;
    for (const cell of cook.counter) if (cell.wob > 0) cell.wob--;
    if (cook.transT <= 0) beginStep();
    return;
  }
  if (cook.phase === 'ing') {
    for (const cell of cook.counter) if (cell.wob > 0) cell.wob--;
    return;
  }
  if (cook.phase !== 'act') return;
  const a = cook.act;
  if (a.kind === 'mix') {
    if (spaceDown && !a.resolved) {
      const amt = 1.6;
      a.progress += amt;
      a.spoonRot += 0.16;
      a.samples.push(amt / 20);
      if (a.samples.length > 90) a.samples.shift();
      if (a.progress >= 100) {
        a.resolved = true;
        actionComplete(88);
      }
    }
  } else if (a.kind === 'boil') {
    a.t++;
    if (a.foamT > 0) {
      a.foamT--;
      if (a.foamT === 0 && a.attempt === 2) sfx.bubble();
    }
    if (a.t % 30 === 0) sfx.bubble();
  } else if (a.kind === 'fry') {
    a.timer++;
    if (a.flash > 0) a.flash--;
    if (a.smokeT > 0) a.smokeT--;
    if (a.timer >= a.duration + 40 && a.smokeT === 0) {
      // auto-burn if totally ignored, treat as tap-at-burnt to keep game moving
      handleFryTap();
    }
  }
}

// ============ DRAW: SCENE ============
function drawKitchen() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#8fd0ee');
  grad.addColorStop(0.4, '#cdeaf7');
  grad.addColorStop(0.55, '#f6e2b8');
  grad.addColorStop(1, '#d8ae6d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // window with ocean + palm
  const wx = W * 0.5, wy = H * 0.14, ww = Math.min(W * 0.5, 260), wh = H * 0.16;
  ctx.fillStyle = '#5fb6e0';
  ctx.fillRect(wx - ww / 2, wy - wh / 2, ww, wh);
  ctx.fillStyle = '#bfe8ff';
  ctx.fillRect(wx - ww / 2, wy - wh / 2, ww, wh * 0.5);
  ctx.fillStyle = '#ffd54d';
  ctx.beginPath(); ctx.arc(wx + ww * 0.28, wy - wh * 0.18, wh * 0.16, 0, Math.PI * 2); ctx.fill();
  // palm
  ctx.strokeStyle = '#6b4423'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(wx - ww * 0.32, wy + wh * 0.5); ctx.quadraticCurveTo(wx - ww * 0.36, wy - wh * 0.1, wx - ww * 0.3, wy - wh * 0.3); ctx.stroke();
  ctx.fillStyle = '#3d9e4f';
  for (let i = 0; i < 4; i++) {
    const a = -Math.PI / 2 + (i - 1.5) * 0.5;
    ctx.beginPath();
    ctx.ellipse(wx - ww * 0.3 + Math.cos(a) * 16, wy - wh * 0.3 + Math.sin(a) * 10, 16, 5, a, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.strokeStyle = '#7a5a30'; ctx.lineWidth = Math.max(6, ww * 0.03);
  ctx.strokeRect(wx - ww / 2, wy - wh / 2, ww, wh);

  // shelf with jars
  const shy = H * 0.28;
  ctx.fillStyle = '#a9744a'; ctx.fillRect(0, shy, W, H * 0.02);
  const jarColors = ['#e88db4', '#7fc9e0', '#ffd54d', '#7fe8a0'];
  for (let i = 0; i < 6; i++) {
    const jx = (W / 6) * (i + 0.5);
    ctx.fillStyle = jarColors[i % jarColors.length];
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.roundRect(jx - 12, shy - 26, 24, 26, 5);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#6b4423';
    ctx.fillRect(jx - 13, shy - 30, 26, 6);
  }

  // counter
  const cty = H * 0.56;
  ctx.fillStyle = '#8a5a34'; ctx.fillRect(0, cty, W, H - cty);
  ctx.fillStyle = '#a9744a'; ctx.fillRect(0, cty, W, H * 0.03);
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 2;
  for (let i = 0; i < 6; i++) {
    ctx.beginPath(); ctx.moveTo((W / 6) * i, cty + H * 0.03); ctx.lineTo((W / 6) * i, H); ctx.stroke();
  }
}

function drawSelect() {
  drawKitchen();
  ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.min(30, W * 0.06) + 'px -apple-system, sans-serif';
  ctx.fillText(tr('pickRecipe'), W / 2, H * 0.1);
  for (const c of cards) {
    const unlocked = c.idx < state.unlocked;
    ctx.fillStyle = unlocked ? 'rgba(255,255,255,0.94)' : 'rgba(120,120,120,0.55)';
    ctx.beginPath(); ctx.roundRect(c.x, c.y, c.w, c.h, 16); ctx.fill();
    const cx = c.x + c.w / 2, cy = c.y + c.h * 0.36;
    if (unlocked) {
      drawIngredientIcon(RECIPES[c.idx].icon, cx, cy, Math.min(c.w, c.h) * 0.28);
    } else {
      ctx.fillStyle = '#555';
      ctx.font = 'bold ' + Math.min(30, c.h * 0.32) + 'px -apple-system, sans-serif';
      ctx.fillText('🔒', cx, cy);
    }
    ctx.fillStyle = unlocked ? '#23364a' : '#eee';
    ctx.font = 'bold ' + Math.min(16, c.w * 0.09) + 'px -apple-system, sans-serif';
    ctx.fillText(recipeName(c.idx), cx, c.y + c.h * 0.68);
    if (unlocked) drawStars(cx, c.y + c.h * 0.86, getStars(c.idx), Math.min(c.w, c.h) * 0.06);
  }
}

function drawProgressDots() {
  const n = cook.recipe.steps.length;
  const y = H * 0.12;
  const spacing = Math.min(28, W * 0.7 / n);
  const left = W / 2 - (n - 1) * spacing / 2;
  for (let i = 0; i < n; i++) {
    ctx.fillStyle = i < cook.step ? '#7fe8a0' : (i === cook.step ? '#ffe066' : 'rgba(255,255,255,0.4)');
    ctx.beginPath(); ctx.arc(left + i * spacing, y, 6, 0, Math.PI * 2); ctx.fill();
  }
}

function drawBanner(text) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(W * 0.08, H * 0.155, W * 0.84, H * 0.075, 14); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.min(24, W * 0.045) + 'px -apple-system, sans-serif';
  ctx.fillText(text, W / 2, H * 0.19);
}

function drawStackedSandwich() {
  const { x, y } = vesselCenter();
  const s = Math.min(W, H) * 0.0017;
  let ly = y + 24 * s;
  for (const item of cook.stackItems) {
    drawIngredientIcon(item, x, ly, 26 * s);
    ly -= 20 * s;
  }
}

function drawBowlSwirl(spoonRot) {
  const { x, y } = vesselCenter();
  const s = Math.min(W, H) * 0.0017;
  for (let i = 0; i < cook.bowlItems.length; i++) {
    const a = (spoonRot || 0) + (i / Math.max(1, cook.bowlItems.length)) * Math.PI * 2;
    drawIngredientIcon(cook.bowlItems[i], x + Math.cos(a) * 30 * s, y - 6 * s + Math.sin(a) * 14 * s, 14 * s);
  }
}

function drawCookScene() {
  drawKitchen();
  const vessel = stepVessel(cook.recipe, cook.step);
  drawVessel(vessel);
  if (cook.recipe.stack) drawStackedSandwich();
  else if (cook.bowlItems.length && cook.phase !== 'act') drawBowlSwirl(0);

  const armPhase = cook.phase === 'act' && cook.act && cook.act.kind === 'mix' ? cook.act.spoonRot : (Date.now() / 400);
  drawStitchChef(W / 2, H * 0.42, Math.min(W, H) * 0.09, cook.phase === 'act' ? armPhase : Math.sin(Date.now() / 900));

  const custX = W * 0.15, custY = H * 0.34;
  const bounce = cook.phase === 'intro' ? Math.abs(Math.sin(Date.now() / 300)) * 6 : 0;
  drawCustomerBust(cook.recipe.customer, custX, custY, Math.min(W, H) * 0.075, bounce);

  if (cook.phase === 'intro') {
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    const bx = custX + W * 0.09, by = custY - H * 0.06, bw = W * 0.6, bh = H * 0.1;
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 14); ctx.fill();
    ctx.beginPath(); ctx.moveTo(bx + 6, by + bh * 0.7); ctx.lineTo(bx - 14, by + bh * 0.9); ctx.lineTo(bx + 6, by + bh * 0.95); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#23364a';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + Math.min(20, W * 0.035) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('orderPrefix'), bx + bw / 2, by + bh * 0.34);
    ctx.font = 'bold ' + Math.min(22, W * 0.04) + 'px -apple-system, sans-serif';
    ctx.fillText(recipeName(cook.idx), bx + bw / 2, by + bh * 0.68);
    ctx.fillStyle = '#fff'; ctx.font = Math.min(16, W * 0.03) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('tapContinue'), W / 2, H * 0.94);
    return;
  }

  drawProgressDots();

  if (cook.phase === 'ing' || cook.phase === 'ingDone') {
    drawBanner(tr('put') + ingName(cook.target));
    for (const cell of cook.counter) {
      const wob = cell.wob ? Math.sin(cell.wob) * 4 : 0;
      drawIngredientIcon(cell.item, cell.x + wob, cell.y, cell.r);
    }
  } else if (cook.phase === 'act' || cook.phase === 'actDone') {
    const kind = cook.act ? cook.act.kind : cook.recipe.steps[cook.step - 1].kind;
    if (kind === 'mix') drawMixUI();
    else if (kind === 'boil') drawBoilUI();
    else if (kind === 'fry') drawFryUI();
  }

  for (const p of popups) {
    const a = 1 - p.t / p.life;
    ctx.globalAlpha = Math.min(1, a * 1.4);
    ctx.fillStyle = p.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 3;
    ctx.font = 'bold ' + Math.max(16, W * 0.03) + 'px -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeText(p.text, p.x, p.y - p.t * 0.6);
    ctx.fillText(p.text, p.x, p.y - p.t * 0.6);
    ctx.globalAlpha = 1;
  }
  drawSparkles();
}

function drawSparkles() {
  for (const s of sparkles) {
    const a = 1 - s.t / s.life;
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = a;
    drawStar(s.x + Math.cos(s.a) * s.v * s.t, s.y + Math.sin(s.a) * s.v * s.t - s.t * 0.3, 3 * a + 1);
    ctx.globalAlpha = 1;
  }
}

function drawMixUI() {
  const a = cook.act;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(W * 0.08, H * 0.155, W * 0.84, H * 0.075, 14); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.min(22, W * 0.04) + 'px -apple-system, sans-serif';
  ctx.fillText(tr('mixLabel') + '  ' + tr('mixHow'), W / 2, H * 0.19);
  drawBowlSwirl(a ? a.spoonRot : 0);
  // spoon
  const { x, y } = vesselCenter();
  const s = Math.min(W, H) * 0.0017;
  ctx.save();
  ctx.translate(x, y - 6 * s);
  ctx.rotate(a ? a.spoonRot : 0);
  ctx.strokeStyle = '#8a5a34'; ctx.lineWidth = 5 * s; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -46 * s); ctx.stroke();
  ctx.fillStyle = '#c9a45c';
  ctx.beginPath(); ctx.ellipse(30 * s, 0, 14 * s, 9 * s, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // progress bar
  const barW = Math.min(320, W * 0.7), barX = W / 2 - barW / 2, barY = H * 0.78;
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.beginPath(); ctx.roundRect(barX, barY, barW, 20, 10); ctx.fill();
  ctx.fillStyle = '#7fe8a0';
  ctx.beginPath(); ctx.roundRect(barX, barY, barW * Math.min(1, (a ? a.progress : 0) / 100), 20, 10); ctx.fill();
}

function drawBoilUI() {
  const a = cook.act;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(W * 0.08, H * 0.155, W * 0.84, H * 0.075, 14); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.min(22, W * 0.04) + 'px -apple-system, sans-serif';
  ctx.fillText(tr('boilLabel') + '  ' + tr('boilHow'), W / 2, H * 0.19);
  // bubbles
  const { x, y } = vesselCenter();
  const s = Math.min(W, H) * 0.0017;
  for (let i = 0; i < 6; i++) {
    const bt = (a.t + i * 12) % 60;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(x + (i - 2.5) * 14 * s, y - 20 * s - bt * s, 4 * s, 0, Math.PI * 2); ctx.fill();
  }
  if (a.foamT > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (let i = 0; i < 10; i++) { ctx.beginPath(); ctx.arc(x + (Math.random() - 0.5) * 140 * s, y - 50 * s - Math.random() * 20 * s, 7 * s, 0, Math.PI * 2); ctx.fill(); }
  }
  const gx = W / 2 - Math.min(300, W * 0.65) / 2, gy = H * 0.78, gw = Math.min(300, W * 0.65), gh = 24;
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.beginPath(); ctx.roundRect(gx, gy, gw, gh, 12); ctx.fill();
  ctx.fillStyle = '#7fe8a0';
  ctx.fillRect(gx + (a.zoneCenter - a.zoneHalf) * gw, gy, a.zoneHalf * 2 * gw, gh);
  const pos = boilNeedlePos(a);
  ctx.strokeStyle = '#ff5555'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(gx + pos * gw, gy - 8); ctx.lineTo(gx + pos * gw, gy + gh + 8); ctx.stroke();
}

function drawFryUI() {
  const a = cook.act;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(W * 0.08, H * 0.155, W * 0.84, H * 0.075, 14); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.min(22, W * 0.04) + 'px -apple-system, sans-serif';
  ctx.fillText(tr('fryLabel') + '  ' + tr('fryHow') + ' (' + (a.side + 1) + '/2)', W / 2, H * 0.19);
  const { x, y } = vesselCenter();
  const p = fryProgress(a);
  let color;
  if (p < 0.5) color = lerpColor('#f5cf9a', '#f0b25a', p / 0.5);
  else if (p < 0.85) color = lerpColor('#f0b25a', '#8a5a2a', (p - 0.5) / 0.35);
  else color = lerpColor('#8a5a2a', '#1c1410', (p - 0.85) / 0.15);
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.ellipse(x, y, 60, 40, 0, 0, Math.PI * 2); ctx.fill();
  if (a.smokeT > 0) {
    ctx.fillStyle = 'rgba(120,120,120,0.6)';
    for (let i = 0; i < 6; i++) { ctx.beginPath(); ctx.arc(x + (Math.random() - 0.5) * 80, y - 30 - Math.random() * 40, 10, 0, Math.PI * 2); ctx.fill(); }
  }
  if (a.flash > 0) { ctx.fillStyle = 'rgba(255,255,255,' + (a.flash / 20) + ')'; ctx.beginPath(); ctx.ellipse(x, y, 65, 45, 0, 0, Math.PI * 2); ctx.fill(); }
  const barW = Math.min(300, W * 0.65), barX = W / 2 - barW / 2, barY = H * 0.78;
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.beginPath(); ctx.roundRect(barX, barY, barW, 20, 10); ctx.fill();
  ctx.fillStyle = '#7fe8a0'; ctx.fillRect(barX + barW * 0.5, barY, barW * 0.28, 20);
  ctx.fillStyle = '#ffd700'; ctx.fillRect(barX + p * barW - 2, barY - 6, 4, 32);
}

function lerpColor(c1, c2, t) {
  t = Math.max(0, Math.min(1, t));
  const p1 = hexToRgb(c1), p2 = hexToRgb(c2);
  const r = Math.round(p1.r + (p2.r - p1.r) * t), g = Math.round(p1.g + (p2.g - p1.g) * t), b = Math.round(p1.b + (p2.b - p1.b) * t);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}
function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

function drawResult() {
  drawKitchen();
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
  const custX = W / 2, custY = H * 0.28;
  drawCustomerBust(cook.recipe.customer, custX, custY, Math.min(W, H) * 0.09, customerBounce > 0 ? Math.abs(Math.sin(customerBounce / 5)) * 10 : 0);
  if (cook.finalStars === 3) {
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = '#e05070';
      const hx = custX + (i - 1) * 40, hy = custY - 60 - (customerBounce % 20);
      drawHeartShape(hx, hy, 8);
    }
  }
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffe066';
  ctx.font = 'bold ' + Math.min(26, W * 0.05) + 'px -apple-system, sans-serif';
  ctx.fillText(recipeName(cook.idx), W / 2, H * 0.44);
  drawStars(W / 2, H * 0.53, cook.finalStars, Math.min(W, H) * 0.03);
  if (cook.justUnlocked) {
    ctx.fillStyle = '#7fe8a0';
    ctx.font = 'bold ' + Math.min(20, W * 0.038) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('unlocked'), W / 2, H * 0.63);
  }
  if (cook.masterChef) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold ' + Math.min(32, W * 0.06) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('masterTitle'), W / 2, H * 0.71);
    ctx.fillStyle = '#fff';
    ctx.font = Math.min(18, W * 0.032) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('masterSub'), W / 2, H * 0.77);
  } else if (cook.feast) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold ' + Math.min(28, W * 0.05) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('feastTitle'), W / 2, H * 0.71);
    ctx.fillStyle = '#fff';
    ctx.font = Math.min(18, W * 0.032) + 'px -apple-system, sans-serif';
    ctx.fillText(tr('feastSub'), W / 2, H * 0.77);
  }
  ctx.fillStyle = '#fff';
  ctx.font = Math.min(18, W * 0.032) + 'px -apple-system, sans-serif';
  ctx.fillText(tr('tapMenu'), W / 2, H * 0.92);
  drawSparkles();
}
function drawHeartShape(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x, y - s * 0.3, x - s, y - s * 0.3, x - s, y + s * 0.3);
  ctx.bezierCurveTo(x - s, y + s * 0.8, x, y + s * 1.1, x, y + s * 1.4);
  ctx.bezierCurveTo(x, y + s * 1.1, x + s, y + s * 0.8, x + s, y + s * 0.3);
  ctx.bezierCurveTo(x + s, y - s * 0.3, x, y - s * 0.3, x, y + s * 0.3);
  ctx.fill();
}

function draw() {
  if (state.mode === 'title') { drawKitchen(); drawTitle(); }
  else if (state.mode === 'select') drawSelect();
  else if (state.mode === 'cook') {
    if (cook.phase === 'result') drawResult();
    else drawCookScene();
  }
}

// ============ MAIN LOOP ============
resize();
let last = 0, acc = 0;
const STEP = 1000 / 60;
function loop(t) {
  requestAnimationFrame(loop);
  if (W !== window.innerWidth || H !== window.innerHeight) resize();
  if (!last) last = t;
  acc += Math.min(t - last, 100);
  last = t;
  while (acc >= STEP) { update(); acc -= STEP; }
  draw();
}
requestAnimationFrame(loop);
</script>
