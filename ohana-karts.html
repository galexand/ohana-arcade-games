<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ohana Karts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    position: fixed;
  }
  #game { display: block; width: 100%; height: 100%; }
  .btn {
    position: fixed;
    right: max(20px, env(safe-area-inset-right));
    width: 78px; height: 78px;
    border-radius: 50%;
    background: rgba(255,255,255,0.28);
    border: 3px solid rgba(255,255,255,0.55);
    color: #fff;
    font-size: 32px;
    font-family: -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    touch-action: none;
  }
  .btn:active, .btn.pressed { background: rgba(255,255,255,0.55); }
  #btnUp   { bottom: calc(max(20px, env(safe-area-inset-bottom)) + 92px); }
  #btnDown { bottom: max(20px, env(safe-area-inset-bottom)); }
  #homeLink {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font: 600 14px -apple-system, sans-serif;
    color: #fff;
    text-decoration: none;
    background: rgba(0,0,0,0.35);
    padding: 5px 12px;
    border-radius: 14px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<a id="homeLink" href="index.html">← Games</a>
<div class="btn" id="btnUp">⬆</div>
<div class="btn" id="btnDown">⬇</div>

<script>
'use strict';

// ============ SETUP ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, K = 1;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  K = Math.max(0.8, Math.min(1.5, H / 460)); // sprite scale
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();

// ============ SOUND ============
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  type = type || 'square'; vol = vol || 0.07; slide = slide || 0;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
const sfx = {
  tick()  { beep(700, 0.06, 'square', 0.05); },
  count() { beep(440, 0.18, 'square', 0.08); },
  go()    { beep(880, 0.4, 'square', 0.09); },
  crash() { beep(160, 0.35, 'sawtooth', 0.1, -100); },
  zap()   { beep(320, 0.14, 'sawtooth', 0.06, -180); },
  thud()  { beep(140, 0.12, 'triangle', 0.08, -60); },
  splat() { beep(240, 0.2, 'triangle', 0.08, -140); },
  boost() { beep(500, 0.3, 'square', 0.07, 600); },
  fix()   { beep(880, 0.08, 'square', 0.05); },
  win()   { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.22, 'square', 0.08), i * 140)); },
  lose()  { [392, 330, 262].forEach((f, i) => setTimeout(() => beep(f, 0.28, 'triangle', 0.07), i * 170)); },
};

// ============ GAME STATE ============
const LEN = 9000;                 // race distance
const MAXSPD = 7, RIVALBASE = 6.15;
const state = { mode: 'select', sel: 0, char: 'S', countT: 0, raceT: 0, place: 1, bestMsg: '' };
const player = { x: 0, lane: 1, laneF: 1, speed: 0, hearts: 3, invuln: 0, stun: 0, finT: 0, boostT: 0 };
const rival  = { x: 0, lane: 0, laneF: 0, speed: 0, weaveT: 120, finT: 0 };
let hazards = [], pads = [], bolts = [], sandwiches = [], parts = [];
let camX = 0, endRoll = 0;

function bestKey(c) { return 'ohanaKartsBest' + c; }
function getBest(c) {
  const v = parseFloat(localStorage.getItem(bestKey(c)));
  return isNaN(v) ? null : v;
}

function startRace(c) {
  state.char = c;
  state.mode = 'count';
  state.countT = 0;
  state.raceT = 0;
  state.bestMsg = '';
  player.x = 260; player.lane = 1; player.laneF = 1; player.speed = 0;
  player.hearts = 3; player.invuln = 0; player.stun = 0; player.finT = 0; player.boostT = 0;
  rival.x = 260; rival.lane = 0; rival.laneF = 0; rival.speed = 0; rival.weaveT = 150; rival.finT = 0;
  hazards = []; pads = []; bolts = []; sandwiches = []; parts = [];
  camX = 0; endRoll = 0;
  // build the track: Gantu, Hämsterviel, Reuben and boost pads take turns
  let x = 1000, i = 0;
  while (x < LEN - 700) {
    const lane = Math.random() < 0.5 ? 0 : 1;
    const r = i % 4;
    if (r === 0) hazards.push({ type: 'H', x, lane, sp: 2.2, cool: 0 });
    else if (r === 1) hazards.push({ type: 'G', x, lane, gunT: 70, flash: 0 });
    else if (r === 2) hazards.push({ type: 'B', x, cd: 60, arm: 0 });
    else pads.push({ x, lane, cd: 0 });
    x += 430 + Math.random() * 340;
    i++;
  }
}

function setLane(l) {
  l = Math.max(0, Math.min(1, l));
  if (l !== player.lane && state.mode === 'race' && player.stun <= 0) {
    player.lane = l;
    sfx.tick();
  }
}

function damageKart() {
  if (player.invuln > 0 || player.stun > 0) return;
  player.hearts--;
  player.invuln = 100;
  player.speed = Math.min(player.speed, 2);
  sfx.crash();
  burst(player.x, laneY(player.laneF) - 20 * K, '#ff8a5c', 12);
  if (player.hearts <= 0) {
    player.stun = 190; // pit repair
    player.speed = 0;
  }
}

function burst(wx, sy, color, n) {
  for (let i = 0; i < n; i++) {
    parts.push({
      wx, sy,
      vx: (Math.random() - 0.5) * 5,
      vy: -Math.random() * 5 - 1,
      life: 30 + Math.random() * 20,
      color,
    });
  }
}

// ============ LAYOUT ============
function roadTop() { return H * 0.52; }
function roadBot() { return H * 0.95; }
function laneY(l) {
  const t = roadTop(), b = roadBot();
  return t + (b - t) * (0.30 + 0.42 * l);
}

// ============ INPUT ============
function bindButton(id, dir) {
  const el = document.getElementById(id);
  const on = e => { e.preventDefault(); initAudio(); el.classList.add('pressed'); setLane(player.lane + dir); };
  const off = e => { e.preventDefault(); el.classList.remove('pressed'); };
  el.addEventListener('touchstart', on, { passive: false });
  el.addEventListener('touchend', off, { passive: false });
  el.addEventListener('touchcancel', off, { passive: false });
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
}
bindButton('btnUp', -1);
bindButton('btnDown', 1);

function tapAt(x, y) {
  initAudio();
  if (state.mode === 'select') {
    startRace(x < W / 2 ? 'S' : 'L');
  } else if (state.mode === 'race') {
    setLane(y < H * 0.62 ? 0 : 1);
  } else if (state.mode === 'finish') {
    state.mode = 'select';
  }
}
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  tapAt(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('mousedown', e => tapAt(e.clientX, e.clientY));

window.addEventListener('keydown', e => {
  initAudio();
  if (state.mode === 'select') {
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') { state.sel = 1 - state.sel; sfx.tick(); }
    if (e.code === 'Digit1') startRace('S');
    if (e.code === 'Digit2') startRace('L');
    if (e.code === 'Enter' || e.code === 'Space') startRace(state.sel === 0 ? 'S' : 'L');
  } else if (state.mode === 'race') {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') setLane(player.lane - 1);
    if (e.code === 'ArrowDown' || e.code === 'KeyS') setLane(player.lane + 1);
  } else if (state.mode === 'finish') {
    if (e.code === 'Enter' || e.code === 'Space') state.mode = 'select';
  }
  if (e.code === 'Space' || e.code.startsWith('Arrow')) e.preventDefault();
});

// ============ UPDATE ============
function update() {
  // particles run in every mode
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.wx += p.vx; p.sy += p.vy; p.vy += 0.25; p.life--;
    if (p.life <= 0) parts.splice(i, 1);
  }

  if (state.mode === 'count') {
    state.countT++;
    if (state.countT === 1 || state.countT === 60 || state.countT === 120) sfx.count();
    if (state.countT >= 180) { state.mode = 'race'; sfx.go(); }
    return;
  }
  if (state.mode !== 'race') return;

  state.raceT++;

  // --- player kart ---
  if (player.stun > 0) {
    player.stun--;
    player.speed = 0;
    if (player.stun % 30 === 0) sfx.fix();
    if (player.stun === 0) { player.hearts = 3; player.invuln = 120; }
  } else {
    const cap = player.boostT > 0 ? 10.5 : MAXSPD;
    if (player.speed < cap) player.speed = Math.min(cap, player.speed + 0.07);
    else player.speed = Math.max(cap, player.speed - 0.06);
  }
  if (player.boostT > 0) player.boostT--;
  if (player.invuln > 0) player.invuln--;
  player.x += player.speed;
  player.laneF += (player.lane - player.laneF) * 0.18;

  // --- rival kart (rubber-banded so the race stays close) ---
  let target = RIVALBASE + Math.max(-0.9, Math.min(0.9, (player.x - rival.x) / 1500));
  rival.speed += (target - rival.speed) * 0.05;
  rival.x += rival.speed;
  rival.laneF += (rival.lane - rival.laneF) * 0.1;
  if (--rival.weaveT <= 0) { rival.lane = 1 - rival.lane; rival.weaveT = 150 + Math.random() * 200; }

  // --- hazards ---
  for (const hz of hazards) {
    if (hz.type === 'H') {
      hz.x += hz.sp;
      if (hz.cool > 0) hz.cool--;
      // rolling roadblock: getting stuck behind him slows you right down
      if (Math.abs(player.laneF - hz.lane) < 0.4 && player.stun <= 0) {
        const gap = hz.x - player.x;
        if (gap > 0 && gap < 78 * K) {
          player.x = hz.x - 78 * K;
          if (player.speed > hz.sp) {
            player.speed = hz.sp * 0.9;
            if (hz.cool <= 0) { sfx.thud(); hz.cool = 40; burst(player.x + 40, laneY(hz.lane) - 10, '#f4f4f6', 5); }
          }
        }
      }
    } else if (hz.type === 'G') {
      if (hz.flash > 0) hz.flash--;
      // Gantu guards his lane and fires down the road
      const dist = hz.x - player.x;
      if (dist > 120 && dist < 720) {
        if (--hz.gunT <= 0) {
          hz.gunT = 105;
          hz.flash = 8;
          bolts.push({ x: hz.x - 40 * K, lane: hz.lane, vx: -6.2 });
          sfx.zap();
        }
      }
      // crashing into Gantu himself really hurts
      if (Math.abs(player.laneF - hz.lane) < 0.4 && Math.abs(player.x - hz.x) < 55 * K) {
        if (player.invuln <= 0) { damageKart(); player.x = hz.x - 70 * K; }
      }
    } else if (hz.type === 'B') {
      // Reuben lobs sandwiches onto the road ahead of you
      if (hz.arm > 0) hz.arm--;
      const dist = hz.x - player.x;
      if (dist > 150 && dist < 700) {
        if (--hz.cd <= 0) {
          hz.cd = 150;
          hz.arm = 12;
          sandwiches.push({ x: player.x + 300, lane: player.lane, t: -28, life: 430 });
          sfx.splat();
        }
      }
    }
  }

  // --- bolts ---
  for (let i = bolts.length - 1; i >= 0; i--) {
    const b = bolts[i];
    b.x += b.vx;
    if (b.x < camX - 300) { bolts.splice(i, 1); continue; }
    if (Math.abs(player.laneF - b.lane) < 0.4 && Math.abs(b.x - player.x) < 40 * K && player.invuln <= 0 && player.stun <= 0) {
      bolts.splice(i, 1);
      damageKart();
    }
  }

  // --- sandwiches on the road ---
  for (let i = sandwiches.length - 1; i >= 0; i--) {
    const s = sandwiches[i];
    s.t++;
    if (--s.life <= 0) { sandwiches.splice(i, 1); continue; }
    if (s.t >= 0 && Math.abs(player.laneF - s.lane) < 0.4 && Math.abs(s.x - player.x) < 42 * K && player.stun <= 0) {
      sandwiches.splice(i, 1);
      player.speed *= 0.32; // sticky!
      sfx.splat();
      burst(player.x, laneY(s.lane) - 8, '#e8c66a', 10);
    }
  }

  // --- boost pads ---
  for (const p of pads) {
    if (p.cd > 0) p.cd--;
    if (p.cd <= 0 && Math.abs(player.laneF - p.lane) < 0.4 && Math.abs(p.x - player.x) < 45 * K && player.stun <= 0) {
      p.cd = 90;
      player.boostT = 55;
      player.speed = 10.5;
      sfx.boost();
      burst(player.x - 30, laneY(p.lane) - 10, '#ffe066', 10);
    }
  }

  // --- finish line ---
  if (!player.finT && player.x >= LEN) player.finT = state.raceT;
  if (!rival.finT && rival.x >= LEN) rival.finT = state.raceT;
  if (player.finT) {
    endRoll++;
    if (endRoll > 55) {
      state.place = rival.finT && rival.finT < player.finT ? 2 : 1;
      const secs = player.finT / 60;
      const best = getBest(state.char);
      if (best === null || secs < best) {
        try { localStorage.setItem(bestKey(state.char), secs.toFixed(2)); } catch (e) {}
        state.bestMsg = '🎉 New best time!';
      } else {
        state.bestMsg = 'Best: ' + best.toFixed(1) + 's';
      }
      state.mode = 'finish';
      if (state.place === 1) {
        sfx.win();
        for (let i = 0; i < 60; i++) parts.push({
          wx: camX + Math.random() * W, sy: -20 - Math.random() * 150,
          vx: (Math.random() - 0.5) * 2, vy: 1 + Math.random() * 2.5,
          life: 120 + Math.random() * 80,
          color: ['#ff6b8a', '#ffe066', '#7dff8a', '#7adcff', '#c77dff'][i % 5],
        });
      } else sfx.lose();
    }
  }

  // --- camera ---
  camX = player.x - W * 0.30;
}

// ============ DRAWING ============
function draw() {
  const t = Date.now();
  // sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#3f9bd9');
  grad.addColorStop(0.45, '#8fd0ee');
  grad.addColorStop(1, '#ffe9c4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // sun
  ctx.fillStyle = '#ffd94d';
  ctx.beginPath();
  ctx.arc(W * 0.82, H * 0.12, 26 * K, 0, Math.PI * 2);
  ctx.fill();
  // clouds
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 340 + 120 - camX * 0.15) % (W + 300) + W + 300) % (W + 300) - 150;
    const cy = H * 0.07 + (i % 3) * H * 0.05;
    ctx.beginPath();
    ctx.arc(cx, cy, 16 * K, 0, Math.PI * 2);
    ctx.arc(cx + 20 * K, cy - 6 * K, 19 * K, 0, Math.PI * 2);
    ctx.arc(cx + 40 * K, cy, 15 * K, 0, Math.PI * 2);
    ctx.fill();
  }
  // ocean with waves + island
  const hor = H * 0.34, beach = H * 0.46;
  ctx.fillStyle = '#2e86c9';
  ctx.fillRect(0, hor, W, beach - hor);
  ctx.fillStyle = '#3d6b4f';
  ctx.beginPath();
  ctx.ellipse(((900 - camX * 0.1) % (W + 500) + W + 500) % (W + 500) - 250, hor + 2, 90 * K, 16 * K, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i = 0; i < 14; i++) {
    const wx = ((i * 150 - camX * 0.3 + Math.sin(t / 900 + i) * 10) % (W + 200) + W + 200) % (W + 200) - 100;
    ctx.fillRect(wx, hor + 8 + (i % 4) * (beach - hor - 14) / 4, 30 * K, 2.5);
  }
  // dry sand
  ctx.fillStyle = '#f0d998';
  ctx.fillRect(0, beach, W, roadTop() - beach);
  // roadside palms + umbrellas (world anchored)
  for (let i = 0; i < 40; i++) {
    const wx = i * 420 + 150;
    const sx = wx - camX * 0.85;
    if (sx < -120 || sx > W + 120) continue;
    if (i % 3 === 2) drawUmbrellaSm(sx, roadTop() - 4);
    else drawPalmSm(sx, roadTop() - 2);
  }
  // road (packed sand)
  ctx.fillStyle = '#d8ae62';
  ctx.fillRect(0, roadTop(), W, roadBot() - roadTop());
  ctx.fillStyle = '#c19a4f';
  ctx.fillRect(0, roadTop(), W, 5);
  ctx.fillRect(0, roadBot() - 5, W, 5);
  // dashed lane divider
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  const divY = (laneY(0) + laneY(1)) / 2 + 14 * K;
  for (let wx = Math.floor(camX / 90) * 90; wx < camX + W + 90; wx += 90) {
    ctx.fillRect(wx - camX, divY, 42, 4);
  }
  // start + finish
  drawCheckerLine(300 - camX);
  drawFinish(LEN - camX, t);

  // boost pads
  for (const p of pads) drawPad(p.x - camX, laneY(p.lane), p.cd > 0, t);
  // sandwiches
  for (const s of sandwiches) {
    const sx = s.x - camX;
    if (sx < -80 || sx > W + 80) continue;
    const drop = s.t < 0 ? (-s.t) * 6 * K : 0;
    drawSandwichSm(sx, laneY(s.lane) + 8 * K - drop, 16 * K);
  }
  // bolts
  for (const b of bolts) {
    const sx = b.x - camX;
    ctx.fillStyle = '#ffb066';
    ctx.beginPath();
    ctx.ellipse(sx, laneY(b.lane) - 16 * K, 11 * K, 5 * K, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(sx, laneY(b.lane) - 16 * K, 5 * K, 2.2 * K, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // villains
  for (const hz of hazards) {
    const sx = hz.x - camX;
    if (sx < -140 || sx > W + 140) continue;
    if (hz.type === 'H') drawHamKart(sx, laneY(hz.lane), hz.x);
    else if (hz.type === 'G') drawGantuGuard(sx, laneY(hz.lane), hz.flash > 0);
    else drawReubenSide(sx, roadTop() - 6, hz.arm > 0, t);
  }

  // karts (draw far lane first)
  const karts = [
    { k: rival, who: state.char === 'S' ? 'L' : 'S', isP: false },
    { k: player, who: state.char, isP: true },
  ].sort((a, b) => a.k.laneF - b.k.laneF);
  for (const kk of karts) drawKart(kk.k, kk.who, kk.isP, t);

  // particles
  for (const p of parts) {
    ctx.globalAlpha = Math.min(1, p.life / 25);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.wx - camX - 3, p.sy - 3, 6, 6);
    ctx.globalAlpha = 1;
  }

  drawHUD(t);
  drawOverlays(t);
}

function drawPalmSm(x, gy) {
  ctx.strokeStyle = '#9a6a3a';
  ctx.lineWidth = 6 * K;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x, gy);
  ctx.quadraticCurveTo(x + 6 * K, gy - 34 * K, x + 20 * K, gy - 54 * K);
  ctx.stroke();
  ctx.strokeStyle = '#3d9c4f';
  ctx.lineWidth = 4.5 * K;
  for (let a = 0; a < 5; a++) {
    const ang = -Math.PI * 0.9 + a * 0.42;
    ctx.beginPath();
    ctx.moveTo(x + 20 * K, gy - 54 * K);
    ctx.quadraticCurveTo(
      x + 20 * K + Math.cos(ang) * 18 * K, gy - 62 * K + Math.sin(ang) * 18 * K,
      x + 20 * K + Math.cos(ang) * 36 * K, gy - 46 * K + Math.sin(ang) * 36 * K);
    ctx.stroke();
  }
}

function drawUmbrellaSm(x, gy) {
  ctx.strokeStyle = '#e8e8e8';
  ctx.lineWidth = 3.5 * K;
  ctx.beginPath();
  ctx.moveTo(x, gy);
  ctx.lineTo(x + 6 * K, gy - 44 * K);
  ctx.stroke();
  for (let i = 0; i < 6; i++) {
    ctx.fillStyle = i % 2 ? '#e85d5d' : '#fff';
    ctx.beginPath();
    ctx.moveTo(x + 6 * K, gy - 44 * K);
    ctx.arc(x + 6 * K, gy - 44 * K, 30 * K, Math.PI + i * (Math.PI / 6), Math.PI + (i + 1) * (Math.PI / 6));
    ctx.closePath();
    ctx.fill();
  }
}

function drawCheckerLine(sx) {
  if (sx < -40 || sx > W + 40) return;
  const rt = roadTop(), rb = roadBot();
  const sq = 12 * K;
  for (let y = rt; y < rb; y += sq) {
    for (let c = 0; c < 2; c++) {
      ctx.fillStyle = (Math.floor(y / sq) + c) % 2 ? '#fff' : '#222';
      ctx.fillRect(sx + c * sq - sq, y, sq, Math.min(sq, rb - y));
    }
  }
}

function drawFinish(sx, t) {
  if (sx < -100 || sx > W + 160) return;
  drawCheckerLine(sx);
  const rt = roadTop();
  // banner on poles
  ctx.fillStyle = '#5d6a8a';
  ctx.fillRect(sx - 14, rt - 64 * K, 6, 64 * K);
  ctx.fillRect(sx + 32, rt - 64 * K, 6, 64 * K);
  ctx.fillStyle = '#c62f42';
  ctx.fillRect(sx - 22, rt - 78 * K, 70, 22 * K);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + 12 * K + 'px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('FINISH', sx + 12, rt - 67 * K);
}

function drawPad(sx, ly, used, t) {
  if (sx < -80 || sx > W + 80) return;
  ctx.fillStyle = used ? 'rgba(255,224,102,0.35)' : 'rgba(255,224,102,' + (0.65 + Math.sin(t / 180) * 0.2) + ')';
  ctx.beginPath();
  ctx.ellipse(sx, ly + 10 * K, 34 * K, 11 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = used ? '#b8962e' : '#8a6d00';
  ctx.font = 'bold ' + 16 * K + 'px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚡', sx, ly + 9 * K);
}

function drawSandwichSm(x, y, s) {
  ctx.fillStyle = '#e0a955';
  ctx.fillRect(x - s * 0.5, y - s * 0.1, s, s * 0.2);
  ctx.fillStyle = '#7fc25c';
  ctx.fillRect(x - s * 0.55, y - s * 0.2, s * 1.1, s * 0.12);
  ctx.fillStyle = '#f08a8a';
  ctx.fillRect(x - s * 0.48, y - s * 0.3, s * 0.96, s * 0.12);
  ctx.fillStyle = '#e0a955';
  ctx.beginPath();
  ctx.ellipse(x, y - s * 0.3, s * 0.5, s * 0.22, 0, Math.PI, Math.PI * 2);
  ctx.fill();
}

function drawHamKart(sx, ly, wx) {
  const y = ly;
  // tiny purple kart
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(sx, y + 12 * K, 34 * K, 7 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#6c3483';
  ctx.fillRect(sx - 28 * K, y - 10 * K, 56 * K, 16 * K);
  wheel(sx - 18 * K, y + 8 * K, 9 * K, wx);
  wheel(sx + 18 * K, y + 8 * K, 9 * K, wx);
  // cape
  ctx.fillStyle = '#c62f42';
  ctx.beginPath();
  ctx.moveTo(sx - 8 * K, y - 24 * K);
  ctx.quadraticCurveTo(sx - 34 * K, y - 16 * K, sx - 26 * K, y - 4 * K);
  ctx.lineTo(sx - 8 * K, y - 10 * K);
  ctx.closePath();
  ctx.fill();
  // hamster driver
  ctx.fillStyle = '#f4f4f6';
  ctx.beginPath();
  ctx.arc(sx, y - 22 * K, 13 * K, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(sx - 8 * K, y - 33 * K, 5.5 * K, 0, Math.PI * 2);
  ctx.arc(sx + 8 * K, y - 33 * K, 5.5 * K, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#f3aec6';
  ctx.beginPath();
  ctx.arc(sx - 8 * K, y - 33 * K, 3 * K, 0, Math.PI * 2);
  ctx.arc(sx + 8 * K, y - 33 * K, 3 * K, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#d8283c';
  ctx.beginPath();
  ctx.arc(sx - 4.5 * K, y - 23 * K, 2.4 * K, 0, Math.PI * 2);
  ctx.arc(sx + 4.5 * K, y - 23 * K, 2.4 * K, 0, Math.PI * 2);
  ctx.fill();
}

function drawGantuGuard(sx, ly, firing) {
  const y = ly + 12 * K, w = 46 * K, h = 74 * K;
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(sx, y, w * 0.7, 7 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // massive body
  ctx.fillStyle = '#68809a';
  ctx.beginPath();
  ctx.moveTo(sx - w * 0.5, y - h * 0.72);
  ctx.quadraticCurveTo(sx - w * 0.58, y - h * 0.2, sx - w * 0.32, y);
  ctx.lineTo(sx + w * 0.32, y);
  ctx.quadraticCurveTo(sx + w * 0.58, y - h * 0.2, sx + w * 0.5, y - h * 0.72);
  ctx.quadraticCurveTo(sx, y - h * 0.95, sx - w * 0.5, y - h * 0.72);
  ctx.fill();
  ctx.fillStyle = '#2e3c4e';
  ctx.beginPath();
  ctx.moveTo(sx - w * 0.32, y - h * 0.5);
  ctx.lineTo(sx + w * 0.32, y - h * 0.5);
  ctx.lineTo(sx + w * 0.24, y - h * 0.04);
  ctx.lineTo(sx - w * 0.24, y - h * 0.04);
  ctx.closePath();
  ctx.fill();
  // head + angry eyes (looking back down the road)
  ctx.fillStyle = '#68809a';
  ctx.beginPath();
  ctx.ellipse(sx, y - h * 0.84, w * 0.26, h * 0.11, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#dfe8f0';
  ctx.beginPath();
  ctx.ellipse(sx - w * 0.12 - 2, y - h * 0.85, 3.4 * K, 2.4 * K, 0, 0, Math.PI * 2);
  ctx.ellipse(sx + w * 0.08 - 2, y - h * 0.85, 3.4 * K, 2.4 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // blaster aimed down the road
  ctx.fillStyle = '#7d8898';
  ctx.fillRect(sx - w * 0.5 - 20 * K, y - h * 0.42, 24 * K, 7 * K);
  ctx.fillStyle = '#e8762e';
  ctx.fillRect(sx - w * 0.5, y - h * 0.42 + 6 * K, 7 * K, 10 * K);
  if (firing) {
    ctx.fillStyle = 'rgba(255,214,102,0.9)';
    ctx.beginPath();
    ctx.arc(sx - w * 0.5 - 24 * K, y - h * 0.38, 8 * K, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawReubenSide(sx, gy, throwing, t) {
  const w = 34 * K;
  // beach mat
  ctx.fillStyle = '#9fd4ef';
  ctx.fillRect(sx - w, gy - 4 * K, w * 2, 5 * K);
  // golden blob
  ctx.fillStyle = '#e0b13e';
  ctx.beginPath();
  ctx.ellipse(sx, gy - 18 * K, w * 0.62, 17 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#f2dca4';
  ctx.beginPath();
  ctx.ellipse(sx, gy - 13 * K, w * 0.36, 9 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // ears
  ctx.fillStyle = '#e0b13e';
  ctx.beginPath();
  ctx.ellipse(sx - 9 * K, gy - 34 * K, 4 * K, 6 * K, -0.4, 0, Math.PI * 2);
  ctx.ellipse(sx + 9 * K, gy - 34 * K, 4 * K, 6 * K, 0.4, 0, Math.PI * 2);
  ctx.fill();
  // sleepy eyes
  ctx.fillStyle = '#2b2013';
  ctx.beginPath();
  ctx.arc(sx - 5 * K, gy - 26 * K, 1.8 * K, 0, Math.PI * 2);
  ctx.arc(sx + 5 * K, gy - 26 * K, 1.8 * K, 0, Math.PI * 2);
  ctx.fill();
  // sandwich in throwing arm
  const ax = throwing ? sx - 20 * K : sx - 16 * K;
  const ay = throwing ? gy - 38 * K : gy - 20 * K;
  drawSandwichSm(ax, ay, 12 * K);
}

function wheel(x, y, r, wx) {
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#9aa7c7';
  ctx.beginPath();
  ctx.arc(x, y, r * 0.45, 0, Math.PI * 2);
  ctx.fill();
  const a = (wx || 0) / 14;
  ctx.strokeStyle = '#4a4a4a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - Math.cos(a) * r * 0.8, y - Math.sin(a) * r * 0.8);
  ctx.lineTo(x + Math.cos(a) * r * 0.8, y + Math.sin(a) * r * 0.8);
  ctx.stroke();
}

function drawKart(k, who, isP, t) {
  const sx = k.x - camX;
  if (sx < -160 || sx > W + 160) return;
  const y = laneY(k.laneF);
  const bob = Math.sin(k.x / 42) * 1.6 * K;
  if (isP && k.invuln > 0 && Math.floor(k.invuln / 4) % 2) return; // blink
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.beginPath();
  ctx.ellipse(sx, y + 13 * K, 44 * K, 8 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // boost flames
  if (isP && k.boostT > 0) {
    ctx.fillStyle = 'rgba(255,150,60,0.85)';
    ctx.beginPath();
    ctx.moveTo(sx - 42 * K, y - 6 * K + bob);
    ctx.lineTo(sx - 42 * K - (16 + Math.random() * 10) * K, y + bob);
    ctx.lineTo(sx - 42 * K, y + 5 * K + bob);
    ctx.closePath();
    ctx.fill();
  }
  // kart body
  ctx.fillStyle = who === 'S' ? '#e04438' : '#f2b035';
  ctx.beginPath();
  ctx.moveTo(sx - 42 * K, y - 14 * K + bob);
  ctx.lineTo(sx + 30 * K, y - 14 * K + bob);
  ctx.quadraticCurveTo(sx + 46 * K, y - 12 * K + bob, sx + 44 * K, y + 2 * K + bob);
  ctx.lineTo(sx - 42 * K, y + 2 * K + bob);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillRect(sx - 34 * K, y - 10 * K + bob, 60 * K, 4 * K);
  // steering wheel
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3 * K;
  ctx.beginPath();
  ctx.arc(sx + 18 * K, y - 20 * K + bob, 6 * K, Math.PI * 0.9, Math.PI * 1.9);
  ctx.stroke();
  // wheels
  wheel(sx - 26 * K, y + 6 * K, 12 * K, k.x);
  wheel(sx + 26 * K, y + 6 * K, 12 * K, k.x);
  // driver
  if (who === 'S') drawStitchDriver(sx - 4 * K, y - 26 * K + bob);
  else drawLiloDriver(sx - 4 * K, y - 26 * K + bob);
  // repair stop
  if (isP && k.stun > 0) {
    ctx.font = 'bold ' + 20 * K + 'px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🔧', sx, y - 58 * K + Math.sin(t / 120) * 4);
    ctx.fillStyle = 'rgba(120,120,120,' + (0.4 + Math.sin(t / 200) * 0.15) + ')';
    ctx.beginPath();
    ctx.arc(sx - 20 * K, y - 40 * K, 7 * K, 0, Math.PI * 2);
    ctx.arc(sx - 32 * K, y - 50 * K, 5 * K, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawStitchDriver(x, y) {
  const BLUE = '#3d7bc9', DARK = '#26508f', BELLY = '#bfe0f4', PINK = '#e88db4';
  ctx.lineWidth = 1.4 * K;
  ctx.strokeStyle = DARK;
  // torso
  ctx.fillStyle = BLUE;
  ctx.beginPath();
  ctx.ellipse(x, y + 8 * K, 10 * K, 9 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // ears
  for (const s of [-1, 1]) {
    ctx.save();
    ctx.translate(x + s * 8 * K, y - 12 * K);
    ctx.rotate(s * 1.1);
    ctx.fillStyle = BLUE;
    ctx.beginPath();
    ctx.ellipse(0, -6 * K, 4 * K, 9 * K, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = PINK;
    ctx.beginPath();
    ctx.ellipse(0, -5 * K, 2 * K, 5.5 * K, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // head
  ctx.fillStyle = BLUE;
  ctx.beginPath();
  ctx.ellipse(x, y - 6 * K, 11 * K, 9.5 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = BELLY;
  ctx.beginPath();
  ctx.ellipse(x + 2 * K, y - 3 * K, 6 * K, 4.5 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // eyes forward (racing!)
  ctx.fillStyle = '#14181f';
  ctx.beginPath();
  ctx.ellipse(x + 5 * K, y - 8 * K, 2.6 * K, 3.6 * K, 0.3, 0, Math.PI * 2);
  ctx.ellipse(x - 3 * K, y - 8 * K, 2.4 * K, 3.4 * K, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x + 5.6 * K, y - 9 * K, 1 * K, 0, Math.PI * 2);
  ctx.fill();
  // nose + grin
  ctx.fillStyle = '#1b2a45';
  ctx.beginPath();
  ctx.ellipse(x + 8 * K, y - 4 * K, 2.4 * K, 1.8 * K, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawLiloDriver(x, y) {
  const SKIN = '#d9976a', HAIR = '#1c1b22';
  // hair behind
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  ctx.ellipse(x - 3 * K, y - 4 * K, 11 * K, 11 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(x - 14 * K, y - 4 * K, 14 * K, 14 * K);
  // dress torso
  ctx.fillStyle = '#d63a2f';
  ctx.beginPath();
  ctx.ellipse(x, y + 9 * K, 9 * K, 8 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(x - 2 * K, y + 8 * K, 1.4 * K, 3 * K, 0.5, 0, Math.PI * 2);
  ctx.fill();
  // face
  ctx.fillStyle = SKIN;
  ctx.beginPath();
  ctx.ellipse(x + 2 * K, y - 6 * K, 8 * K, 7.5 * K, 0, 0, Math.PI * 2);
  ctx.fill();
  // bangs
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  ctx.ellipse(x + 1 * K, y - 10 * K, 9 * K, 4.5 * K, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  // flower
  ctx.fillStyle = '#f7f7fb';
  for (let i = 0; i < 5; i++) {
    const a = i / 5 * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(x - 6 * K + Math.cos(a) * 2 * K, y - 12 * K + Math.sin(a) * 2 * K, 1.5 * K, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#ffd54d';
  ctx.beginPath();
  ctx.arc(x - 6 * K, y - 12 * K, 1.1 * K, 0, Math.PI * 2);
  ctx.fill();
  // eye + smile
  ctx.fillStyle = '#26211f';
  ctx.beginPath();
  ctx.arc(x + 5 * K, y - 6 * K, 1.5 * K, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#8a4b32';
  ctx.lineWidth = 1.3 * K;
  ctx.beginPath();
  ctx.arc(x + 4 * K, y - 3 * K, 2.6 * K, 0.3, Math.PI - 0.5);
  ctx.stroke();
}

function drawHeart(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x, y - s * 0.3, x - s, y - s * 0.3, x - s, y + s * 0.3);
  ctx.bezierCurveTo(x - s, y + s * 0.8, x, y + s * 1.1, x, y + s * 1.4);
  ctx.bezierCurveTo(x, y + s * 1.1, x + s, y + s * 0.8, x + s, y + s * 0.3);
  ctx.bezierCurveTo(x + s, y - s * 0.3, x, y - s * 0.3, x, y + s * 0.3);
  ctx.fill();
}

function drawHUD(t) {
  if (state.mode === 'select') return;
  const pad = Math.max(14, H * 0.02);
  // hearts
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < player.hearts ? '#ff4d6d' : 'rgba(0,0,0,0.25)';
    drawHeart(pad + 14 + i * 32, pad + 6, 12);
  }
  // time + place
  ctx.font = 'bold 20px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 4;
  const secs = (state.raceT / 60).toFixed(1) + 's';
  const ahead = player.finT ? state.place === 1 : player.x >= rival.x;
  const label = (ahead ? '🥇 1st' : '🥈 2nd') + '   ' + secs;
  ctx.strokeText(label, W - pad, pad);
  ctx.fillText(label, W - pad, pad);
  // progress bar
  const bw = W * 0.44, bx = (W - bw) / 2, by = pad + 8;
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(bx, by, bw, 6);
  ctx.font = '13px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏁', bx + bw + 12, by + 3);
  const dot = (k, col) => {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(bx + bw * Math.min(1, k.x / LEN), by + 3, 6, 0, Math.PI * 2);
    ctx.fill();
  };
  dot(rival, state.char === 'S' ? '#f2b035' : '#e04438');
  dot(player, state.char === 'S' ? '#e04438' : '#f2b035');
}

function drawOverlays(t) {
  if (state.mode === 'race') return;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (state.mode === 'select') {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);
    const big = Math.min(52, W * 0.085);
    ctx.font = 'bold ' + big + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('🏎 OHANA KARTS 🏁', W / 2, H * 0.16);
    ctx.font = 'bold ' + Math.min(22, W * 0.04) + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('Who is racing today? Tap a driver!', W / 2, H * 0.27);
    // two picks
    for (const [i, who] of [[0, 'S'], [1, 'L']]) {
      const cx = W * (i === 0 ? 0.3 : 0.7), cy = H * 0.52;
      ctx.fillStyle = state.sel === i ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.18)';
      ctx.beginPath();
      const rw = Math.min(220, W * 0.36), rh = H * 0.34;
      ctx.roundRect ? ctx.roundRect(cx - rw / 2, cy - rh / 2, rw, rh, 18) : ctx.rect(cx - rw / 2, cy - rh / 2, rw, rh);
      ctx.fill();
      const fake = { x: camX + cx, laneF: 0, invuln: 0, stun: 0, boostT: 0 };
      const saveLaneY = laneY;
      // draw a preview kart at the card position
      ctx.save();
      ctx.translate(0, cy + 20 - laneY(0));
      drawKart(fake, who, false, t);
      ctx.restore();
      ctx.font = 'bold ' + Math.min(24, W * 0.045) + 'px -apple-system, sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText(who === 'S' ? 'STITCH' : 'LILO', cx, cy + rh / 2 - 40);
      const best = getBest(who);
      ctx.font = '14px -apple-system, sans-serif';
      ctx.fillStyle = '#ffe066';
      ctx.fillText(best ? 'best: ' + best.toFixed(1) + 's' : 'no time yet', cx, cy + rh / 2 - 18);
    }
    ctx.font = '14px -apple-system, sans-serif';
    ctx.fillStyle = '#dce9f5';
    ctx.fillText('⌨  1 = Stitch · 2 = Lilo · ↑ ↓ or ⬆⬇ switch lanes · dodge Gantu, Hämsterviel & Reuben!', W / 2, H * 0.86);
  } else if (state.mode === 'count') {
    const n = 3 - Math.floor(state.countT / 60);
    ctx.font = 'bold ' + Math.min(110, W * 0.2) + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 8;
    ctx.strokeText(n > 0 ? String(n) : 'GO!', W / 2, H * 0.4);
    ctx.fillText(n > 0 ? String(n) : 'GO!', W / 2, H * 0.4);
  } else if (state.mode === 'finish') {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    const big = Math.min(56, W * 0.09);
    ctx.font = 'bold ' + big + 'px -apple-system, sans-serif';
    ctx.fillStyle = state.place === 1 ? '#ffd700' : '#dce9f5';
    ctx.fillText(state.place === 1 ? '🏆 1st PLACE!' : '🥈 2nd place…', W / 2, H * 0.34);
    ctx.font = 'bold ' + Math.min(26, W * 0.05) + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('Time: ' + (player.finT / 60).toFixed(1) + 's    ' + state.bestMsg, W / 2, H * 0.48);
    ctx.fillText(state.place === 1 ? 'Ohana pride! 🌺' : 'So close — rematch?', W / 2, H * 0.58);
    ctx.font = '17px -apple-system, sans-serif';
    ctx.fillStyle = '#ffe066';
    ctx.fillText('Tap to race again', W / 2, H * 0.7);
  }
}

// ============ MAIN LOOP ============
let last = 0, acc = 0;
const STEP = 1000 / 60;
function loop(t) {
  requestAnimationFrame(loop);
  if (!last) last = t;
  acc += Math.min(t - last, 100);
  last = t;
  while (acc >= STEP) {
    update();
    acc -= STEP;
  }
  draw();
}
requestAnimationFrame(loop);
</script>
